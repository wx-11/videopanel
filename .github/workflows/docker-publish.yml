name: build-and-push-docker

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  docker:
    name: 自动构建并推送镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 生成北京时间标签
        run: echo "IMAGE_TAG=$(TZ=Asia/Shanghai date +%Y-%m-%d_%H-%M-%S)" >> "$GITHUB_ENV"

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/videopanel:latest
            ${{ secrets.DOCKER_USERNAME }}/videopanel:${{ env.IMAGE_TAG }}

      - name: 发布成功
        if: success()
        run: |
          echo "✅ Docker 镜像发布成功！"
          echo "📦 ${{ secrets.DOCKER_USERNAME }}/videopanel:latest"
          echo "📦 ${{ secrets.DOCKER_USERNAME }}/videopanel:${{ env.IMAGE_TAG }}"
