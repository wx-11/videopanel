name: build-windows

on:
  workflow_dispatch:
    inputs:
      build_ref:
        description: "Git ref to build (branch/tag/SHA). Leave empty to use the workflow ref."
        required: false
        default: ""
      release_tag:
        description: "If set, create/update a GitHub Release for this tag (e.g. v1.0.0)."
        required: false
        default: ""
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (default)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_ref == ''
        uses: actions/checkout@v4

      - name: Checkout (custom ref)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.build_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build (Electron)
        run: npm run electron:build:ci

      - name: Collect artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -Path "release\*.exe" -Destination "artifacts\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "release\*.exe.blockmap" -Destination "artifacts\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "release\latest.yml" -Destination "artifacts\" -Force -ErrorAction SilentlyContinue
          Get-ChildItem artifacts -Force | Format-Table Name,Length,LastWriteTime -Auto

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: artifacts/**

      - name: Clean existing release assets
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            core.info(`Release tag: ${tag}`);
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`Found release id=${release.id}, assets=${release.assets.length}`);
              for (const asset of release.assets) {
                core.info(`Deleting asset: ${asset.name} (${asset.id})`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            } catch (e) {
              core.info(`No existing release for ${tag} (or failed): ${e.message}`);
            }

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: artifacts/**
